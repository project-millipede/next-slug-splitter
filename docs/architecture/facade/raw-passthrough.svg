<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900"
  viewBox="0 0 1200 900" role="img"
  font-family="system-ui, -apple-system, sans-serif" shape-rendering="geometricPrecision">
  <title>Benchmark asset facade compressed response flow</title>
  <desc>The browser makes one request to the benchmark website, which makes one upstream request to the target Next.js application. The former fetch facade automatically decodes the compressed JavaScript response and may create a new encoded representation. Raw passthrough retains the target bytes and compression metadata so the browser measures the target encoded JavaScript size before decoding and executing it. The former fetch path is shown only for comparison; the benchmark measures the browser-visible response from the raw-passthrough path.</desc>
  <defs>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-coral" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#D85A30" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#C47A1A" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="1200" height="900" rx="8" fill="#FFFFFF"/>
  <text x="600" y="34" text-anchor="middle" font-size="19" font-weight="500" fill="#444441">Benchmark asset facade · compressed response flow</text>
  <text x="600" y="58" text-anchor="middle" font-size="11.5" font-weight="400" fill="#5F5E5A">the request topology stays the same · only the server-side return path changes</text>
  <rect x="68" y="82" width="1064" height="210" rx="10" fill="#FAF9F5" stroke="#E3E1D9" stroke-width="1"/>
  <text x="86" y="107" text-anchor="start" font-size="11" font-weight="600" fill="#444441">1 · COMMON REQUEST PATH</text>
  <text x="86" y="125" text-anchor="start" font-size="9.8" font-weight="400" fill="#5F5E5A">the iframe initiates a normal asset request · the website creates one sequential upstream request</text>
  <rect x="946" y="94" width="158" height="28" rx="14" fill="#F1EFE8" stroke="#888780" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="1025" y="112" text-anchor="middle" font-size="9.2" font-weight="500" fill="#5F5E5A">REQUEST →</text>
  <rect x="100" y="164" width="250" height="72" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="225" y="193" text-anchor="middle" font-size="12.5" font-weight="500" fill="#3C3489">browser · hidden iframe</text>
  <text x="225" y="215" text-anchor="middle" font-size="9.2" font-weight="400" fill="#3C3489">GET /zones/&lt;target&gt;/_next/…</text>
  <rect x="475" y="164" width="250" height="72" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="600" y="193" text-anchor="middle" font-size="12.5" font-weight="500" fill="#3C3489">website zone route</text>
  <text x="600" y="215" text-anchor="middle" font-size="9.2" font-weight="400" fill="#3C3489">first segment === &#x27;_next&#x27; · select target</text>
  <rect x="850" y="164" width="250" height="72" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="975" y="193" text-anchor="middle" font-size="12.5" font-weight="500" fill="#3C3489">target Next.js app</text>
  <text x="975" y="215" text-anchor="middle" font-size="9.2" font-weight="400" fill="#3C3489">GET /_next/static/…</text>
  <path d="M350 200 L475 200" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-purple)"/>
  <path d="M725 200 L850 200" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-purple)"/>
  <text x="412.5" y="190" text-anchor="middle" font-size="9.2" font-weight="400" fill="#3C3489">client request</text>
  <text x="787.5" y="190" text-anchor="middle" font-size="9.2" font-weight="400" fill="#3C3489">server request</text>
  <text x="600" y="269" text-anchor="middle" font-size="10.2" font-weight="400" fill="#5F5E5A">one browser request · one server-to-target request</text>
  <rect x="68" y="312" width="1064" height="250" rx="10" fill="#FAF9F5" stroke="#E3E1D9" stroke-width="1"/>
  <text x="86" y="337" text-anchor="start" font-size="11" font-weight="600" fill="#444441">2 · PREVIOUS · TRANSFORMING RETURN PATH</text>
  <text x="86" y="355" text-anchor="start" font-size="9.8" font-weight="400" fill="#5F5E5A">historical comparison only · this response is not used by the current benchmark</text>
  <rect x="946" y="324" width="158" height="28" rx="14" fill="#F1EFE8" stroke="#888780" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="1025" y="342" text-anchor="middle" font-size="9.2" font-weight="500" fill="#5F5E5A">← NOT MEASURED</text>
  <rect x="88" y="398" width="220" height="78" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="198" y="425" text-anchor="middle" font-size="12.5" font-weight="500" fill="#444441">browser</text>
  <text x="198" y="447" text-anchor="middle" font-size="9.2" font-weight="400" fill="#5F5E5A">receives one response</text>
  <text x="198" y="460" text-anchor="middle" font-size="9.2" font-weight="400" fill="#5F5E5A">outer representation</text>
  <rect x="340" y="398" width="220" height="78" rx="8" fill="#FAEEDA" stroke="#C47A1A" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="450" y="425" text-anchor="middle" font-size="12.5" font-weight="500" fill="#854F0B">facade + platform</text>
  <text x="450" y="447" text-anchor="middle" font-size="9.2" font-weight="400" fill="#854F0B">encoding metadata removed</text>
  <text x="450" y="460" text-anchor="middle" font-size="9.2" font-weight="400" fill="#854F0B">may recompress</text>
  <rect x="592" y="398" width="220" height="78" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
  <text x="702" y="425" text-anchor="middle" font-size="12.5" font-weight="500" fill="#712B13">server-side fetch()</text>
  <text x="702" y="447" text-anchor="middle" font-size="9.2" font-weight="400" fill="#993C1D">automatically decodes</text>
  <text x="702" y="460" text-anchor="middle" font-size="9.2" font-weight="400" fill="#993C1D">the JavaScript response</text>
  <rect x="844" y="398" width="244" height="78" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="966" y="425" text-anchor="middle" font-size="12.5" font-weight="500" fill="#3C3489">target Next.js app</text>
  <text x="966" y="447" text-anchor="middle" font-size="9.2" font-weight="400" fill="#3C3489">Content-Encoding: br / gzip</text>
  <text x="966" y="460" text-anchor="middle" font-size="9.2" font-weight="400" fill="#3C3489">encoded JavaScript response</text>
  <path d="M844 437 L812 437" fill="none" stroke="#D85A30" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-coral)"/>
  <path d="M592 437 L560 437" fill="none" stroke="#D85A30" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-coral)"/>
  <path d="M340 437 L308 437" fill="none" stroke="#C47A1A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="5 4" marker-end="url(#arrow-amber)"/>
  <rect x="220" y="496" width="760" height="44" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
  <text x="600" y="523" text-anchor="middle" font-size="10.2" font-weight="500" fill="#712B13">transferred JS size describes the website response · target encoding is not guaranteed</text>
  <rect x="68" y="580" width="1064" height="250" rx="10" fill="#FAF9F5" stroke="#E3E1D9" stroke-width="1"/>
  <text x="86" y="605" text-anchor="start" font-size="11" font-weight="600" fill="#444441">3 · CURRENT · RAW PASSTHROUGH RETURN PATH</text>
  <text x="86" y="623" text-anchor="start" font-size="9.8" font-weight="400" fill="#5F5E5A">the website transports the client chunk without decoding or executing it</text>
  <rect x="946" y="592" width="158" height="28" rx="14" fill="#F1EFE8" stroke="#888780" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="1025" y="610" text-anchor="middle" font-size="9.2" font-weight="500" fill="#5F5E5A">← MEASURED RESPONSE</text>
  <rect x="88" y="666" width="220" height="78" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
  <text x="198" y="693" text-anchor="middle" font-size="12.5" font-weight="500" fill="#185FA5">browser</text>
  <text x="198" y="715" text-anchor="middle" font-size="9.2" font-weight="400" fill="#185FA5">receives once · measures</text>
  <text x="198" y="728" text-anchor="middle" font-size="9.2" font-weight="400" fill="#185FA5">decodes · executes JS</text>
  <rect x="340" y="666" width="220" height="78" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="450" y="693" text-anchor="middle" font-size="12.5" font-weight="500" fill="#085041">raw facade response</text>
  <text x="450" y="715" text-anchor="middle" font-size="9.2" font-weight="400" fill="#0F6E56">encoding + length preserved</text>
  <text x="450" y="728" text-anchor="middle" font-size="9.2" font-weight="400" fill="#0F6E56">same JavaScript byte stream</text>
  <rect x="592" y="666" width="220" height="78" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="702" y="693" text-anchor="middle" font-size="12.5" font-weight="500" fill="#085041">node:http stream</text>
  <text x="702" y="715" text-anchor="middle" font-size="9.2" font-weight="400" fill="#0F6E56">raw IncomingMessage</text>
  <text x="702" y="728" text-anchor="middle" font-size="9.2" font-weight="400" fill="#0F6E56">no automatic decoding</text>
  <rect x="844" y="666" width="244" height="78" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="966" y="693" text-anchor="middle" font-size="12.5" font-weight="500" fill="#3C3489">target Next.js app</text>
  <text x="966" y="715" text-anchor="middle" font-size="9.2" font-weight="400" fill="#3C3489">Content-Encoding: br / gzip</text>
  <text x="966" y="728" text-anchor="middle" font-size="9.2" font-weight="400" fill="#3C3489">encoded JavaScript response</text>
  <path d="M844 705 L812 705" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-teal)"/>
  <path d="M592 705 L560 705" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-teal)"/>
  <path d="M340 705 L308 705" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-teal)"/>
  <rect x="220" y="764" width="760" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="600" y="791" text-anchor="middle" font-size="10.2" font-weight="500" fill="#085041">BENCHMARK USES THIS RESPONSE · encoded JS bytes · decoded JS bytes</text>
  <rect x="244" y="850" width="300" height="28" rx="14" fill="#F1EFE8" stroke="#888780" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="394" y="868" text-anchor="middle" font-size="9.2" font-weight="500" fill="#5F5E5A">ONE CLIENT REQUEST · ONE RESPONSE</text>
  <rect x="656" y="850" width="300" height="28" rx="14" fill="#F1EFE8" stroke="#888780" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="806" y="868" text-anchor="middle" font-size="9.2" font-weight="500" fill="#5F5E5A">ONLY THE BROWSER EXECUTES THE CHUNK</text>
</svg>
